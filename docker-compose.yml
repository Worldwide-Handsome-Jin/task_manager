version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://taskuser:taskpass@db:5432/taskdb
      - SECRET_KEY=your-secret-key-for-development
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy  # ждём пока PostgreSQL готов
    volumes:
      - .:/app  # hot-reload в разработке

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"  # пробрасываем порт для доступа из PyCharm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: